name: Bug Report
description: Report a bug in the Lovelace card UI or interactions
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Please fill out this form to report bugs in the Lovelace card.

        > [!IMPORTANT]
        > If your issue is with the **Home Assistant integration** (e.g. config flows, entities, background service calls) or the **underlying Python library**, please report it in their respective repositories:
        > - [Report Integration Issue](https://github.com/selvakk2k/ha-miraie-ac-in/issues)
        > - [Report Python Library Issue](https://github.com/selvakk2k/miraie-ac-in/issues)
  - type: input
    id: card_version
    attributes:
      label: Card Version
      description: The version of the card you are running (e.g. v1.3.3).
      placeholder: e.g. v1.3.3
    validations:
      required: true
  - type: dropdown
    id: integration_source
    attributes:
      label: Integration Source / Version
      description: |
        Which integration are you running, and what version? (Knowing this helps triage parsing bugs like the cv  vs cv_ separator formats).
      options:
        - "Selvakk2k integration (ha-miraie-ac-in) - v1.3.7+"
        - "Selvakk2k integration (ha-miraie-ac-in) - Older version"
        - "Upstream integration (rkzofficial/ha-miraie-ac)"
        - "Other / Custom Fork"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description of the Bug
      description: Clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: configuration
    attributes:
      label: Card Configuration (YAML)
      description: Your Lovelace card configuration.
      render: yaml
    validations:
      required: false
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Steps to consistently reproduce the behavior.
    validations:
      required: false
